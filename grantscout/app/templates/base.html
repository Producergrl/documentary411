<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GrantScout{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #13110d;
      --bg2:      #1a1814;
      --bg3:      #211f1a;
      --gold:     #ed9527;
      --gold2:    #f5a942;
      --gold-dim: rgba(237,149,39,0.12);
      --gold-bdr: rgba(237,149,39,0.3);
      --text:     #e8e3d8;
      --text2:    #a8a090;
      --text3:    #6b6358;
      --border:   rgba(255,255,255,0.07);
      --red:      #e87a68;
      --green:    #7dc47d;
      --serif:    'Georgia', serif;
      --sans:     'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(19,17,13,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 700;
      color: var(--gold2);
      text-decoration: none;
    }
    .logo span { color: var(--text3); font-size: 13px; font-family: var(--sans); font-weight: 400; margin-left: 10px; }
    .header-right { margin-left: auto; display: flex; gap: 16px; align-items: center; }
    .header-right a { font-size: 12px; color: var(--text3); text-decoration: none; transition: color .15s; }
    .header-right a:hover { color: var(--gold); }

    main { flex: 1; padding: 48px 32px; max-width: 720px; margin: 0 auto; width: 100%; }

    h1 { font-family: var(--serif); font-size: 32px; font-weight: 400; color: var(--text); margin-bottom: 8px; }
    h2 { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
    p  { font-size: 14px; color: var(--text2); line-height: 1.7; }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      margin-top: 32px;
    }

    label { display: block; font-size: 12px; color: var(--text3); letter-spacing: .04em; margin-bottom: 5px; margin-top: 18px; }
    label:first-of-type { margin-top: 0; }

    input[type=text],
    input[type=email],
    input[type=password],
    textarea {
      width: 100%;
      padding: 10px 13px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      color: var(--text);
      font-family: var(--sans);
      transition: border-color .15s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--gold-bdr); }
    input::placeholder, textarea::placeholder { color: var(--text3); }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-block;
      padding: 11px 26px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background .15s, border-color .15s;
    }
    .btn-primary   { background: var(--gold); color: #13110d; }
    .btn-primary:hover { background: var(--gold2); }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--gold-bdr); }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
    .btn-ghost     { background: transparent; color: var(--text3); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border); color: var(--text2); }
    .btn-big { padding: 16px 40px; font-size: 14px; }

    .error-box {
      background: rgba(220,80,60,0.08);
      border: 1px solid rgba(220,80,60,0.25);
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
      margin-top: 16px;
    }
    .success-box {
      background: rgba(100,180,100,0.07);
      border: 1px solid rgba(100,180,100,0.2);
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--green);
      margin-top: 16px;
    }
    .hint { font-size: 11px; color: var(--text3); margin-top: 5px; }

    .step-bar { display: flex; gap: 6px; margin-bottom: 28px; }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border);
    }
    .step-dot.active  { background: var(--gold); }
    .step-dot.done    { background: var(--text3); }

    footer {
      border-top: 1px solid var(--border);
      padding: 16px 32px;
      text-align: center;
      font-size: 11px;
      color: var(--text3);
    }
    footer a { color: var(--text3); text-decoration: none; }
    footer a:hover { color: var(--gold); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <a class="logo" href="/">GrantScout <span>by Documentary411</span></a>
    <div class="header-right">
      <a href="/settings">Settings</a>
      <a href="https://documentary411.org" target="_blank" rel="noopener">Help</a>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    GrantScout &mdash; by <a href="https://documentary411.org" target="_blank" rel="noopener">Documentary411</a>
    &nbsp;&middot;&nbsp; Your data never leaves your computer.
  </footer>
</body>
</html>
